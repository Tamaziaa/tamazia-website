name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Astro site
        run: npm run build

      - name: Run patch-dist
        run: node patch-dist.js

      - name: Compile Cloudflare Functions
        run: |
          npx wrangler pages functions build functions/ \
            --outdir=dist/_worker_build \
            --project-directory=dist
          cp dist/_worker_build/index.js dist/_worker.js

      - name: Notify Slack + Telegram on deploy failure (self-verifying endpoint)
        if: failure()
        env:
          SHA: ${{ github.sha }}
          RUN: ${{ github.run_id }}
          TITLE: ${{ github.event.head_commit.message }}
        run: |
          set +e
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({
            'run_id': os.environ['RUN'],
            'sha': os.environ['SHA'],
            'title': (os.environ.get('TITLE') or 'deploy')[:200],
          }))
          ")
          curl -s -X POST "https://tamazia-website.pages.dev/api/admin/notify-deploy" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
          echo "notify-deploy fired"

          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN: ${{ github.run_id }}
        run: |
          set +e
          SHORT_SHA=$(echo $SHA | cut -c1-8)
          URL="https://github.com/${REPO}/actions/runs/${RUN}"
          MSG="DEPLOY FAILED · tamazia-website · ${SHORT_SHA} · ${URL}"
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL" ]; then
            curl -s -X POST https://slack.com/api/chat.postMessage               -H "Authorization: Bearer ${SLACK_BOT_TOKEN}"               -H "Content-Type: application/json; charset=utf-8"               -d "{\"channel\":\"${SLACK_CHANNEL}\",\"text\":\":red_circle: ${MSG}\"}"
            echo ""
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"               -H "Content-Type: application/json"               -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"\u{1F534} ${MSG}\",\"parse_mode\":\"HTML\"}"
            echo ""
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist/ \
            --project-name=tamazia-website \
            --branch=main \
            --no-bundle \
            --commit-dirty=true

      - name: Post-deploy synthetic check
        run: |
          sleep 30
          fail=0
          for ep in /api/contact /api/audit /api/briefings; do
            CODE=$(curl -sX POST -o /dev/null -w "%{http_code}" --max-time 10 \
              -H 'Content-Type: application/json' -d '{}' \
              "https://tamazia-website.pages.dev${ep}")
            if [ "$CODE" = "404" ]; then
              echo "FAIL: ${ep} returns 404"
              fail=1
            else
              echo "OK ${ep} -> ${CODE}"
            fi
          done
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://tamazia-website.pages.dev/api/health")
          if [ "$CODE" != "200" ]; then
            echo "FAIL: /api/health -> ${CODE}"
            fail=1
          else
            echo "OK /api/health -> 200"
          fi
          exit $fail
