name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Run patch-dist
        run: node patch-dist.js

      - name: Compile Cloudflare Functions
        run: |
          npx wrangler pages functions build functions/ \
            --outdir=dist/_worker_build \
            --project-directory=dist
          cp dist/_worker_build/index.js dist/_worker.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist/ \
            --project-name=tamazia-website \
            --branch=main \
            --no-bundle \
            --commit-dirty=true
