name: Dependency review
# Blocks a PR that introduces a vulnerable or incompatible dependency (npm). Closes the hole that let
# the astrojs/sitemap bump brick Deploy. Free, native GitHub action.
on:
  pull_request:
permissions:
  contents: read
concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true
jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
