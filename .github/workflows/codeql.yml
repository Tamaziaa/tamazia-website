# Stage for .github/workflows/codeql.yml
# Push requires PAT with workflow scope. To apply:
#   1. Generate new GitHub PAT (fine-grained) with: repo, workflow, security_events
#   2. git remote set-url origin https://USERNAME:NEW_PAT@github.com/Tamaziaa/tamazia-website.git
#   3. cp references/_pending-workflow-changes/codeql.yml .github/workflows/codeql.yml
#   4. git add .github/workflows/codeql.yml && git commit -m "ci: codeql workflow" && git push

name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '21 5 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
