      .subtitle { font: 400 26px/1.4 'Inter', sans-serif; fill: #4A1625; }
      .accent { font: italic 600 22px/1 'Playfair Display', serif; fill: #5A1A2B; }
      .lockup { font: 700 28px/1 'Playfair Display', serif; letter-spacing: 0.06em; fill: #2A0C14; }
