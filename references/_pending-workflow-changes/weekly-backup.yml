# Stage for .github/workflows/weekly-backup.yml

name: Weekly automated backup

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with: { fetch-depth: 0 }
      - name: Bundle the repo
        run: |
          git bundle create tamazia-website-$(date +%F).bundle --all
      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: backup-$(date +%F)
          name: "Weekly backup $(date +%F)"
          files: tamazia-website-*.bundle
          make_latest: false
