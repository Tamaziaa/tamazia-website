name: CodeQL
# Static analysis of the audit engine. Both repos are PUBLIC, so GitHub Advanced Security / CodeQL is FREE here.
# Results land in the repo's Security > Code scanning tab and annotate every PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # weekly, so a dormant flaw cannot sit forever
permissions:
  actions: read
  contents: read
  security-events: write   # required to upload the SARIF results
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Initialise CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9  # v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality is the widest pack: security flaws AND correctness bugs
          # (unused variables, unreachable code, the ReferenceError class that silently
          # fail-opened the cookie collector for two whole engine versions).
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@02c5e83432fe5497fd85b873b6c9f16a8578e1d9  # v3
      - name: Analyse
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9  # v3
        with:
          category: /language:${{ matrix.language }}
