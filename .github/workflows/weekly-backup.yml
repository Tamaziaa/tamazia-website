# Stage for .github/workflows/weekly-backup.yml
name: Weekly automated backup

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      # FIX (2026-06-23): action inputs do NOT run shell, so `$(date +%F)` was passed LITERALLY -> a constant
      # tag "backup-$(date +%F)" that collides on every run after the first -> weekly failure. Compute the date
      # in a real shell step and reference it via env. Tag now carries run_number too, so reruns never collide.
      - name: Compute date + bundle
        id: meta
        run: |
          D="$(date +%F)"
          echo "date=$D" >> "$GITHUB_OUTPUT"
          git bundle create "tamazia-website-$D.bundle" --all
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: backup-${{ steps.meta.outputs.date }}-${{ github.run_number }}
          name: "Weekly backup ${{ steps.meta.outputs.date }}"
          files: tamazia-website-*.bundle
          make_latest: false
