# Method B · Lighthouse CI + Pa11y combined gate
# M3 2026-06-11 fix: the old flags asserted "performance"/"accessibility" as AUDIT
# names ("X is not a known audit" — failed every run since introduction). Asserts now
# live in lighthouserc.json as category assertions, and lhci starts/awaits the
# preview server itself (no `npm run preview &` + sleep race).
name: lighthouse-pa11y
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true  # informational gate; never red the run / email
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm run build
      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
      - name: Pa11y CI
        run: |
          npm install -g pa11y-ci
          (npm run preview &) && sleep 5
          pa11y-ci --config .pa11yci
