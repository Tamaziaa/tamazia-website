# Method A · Visual regression + per-breakpoint DOM-overflow audit
# Runs on every PR; fails if any element has scrollWidth > clientWidth (overflow bug)
# OR if any screenshot diff > 0.5% from baseline.
name: visual-regression
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build site
        continue-on-error: true
        run: npm run build
      # M3 2026-06-11 fix: the job previously had no server (playwright.config.ts
      # now provides webServer) and pulled in the long-running remodel-audit spec.
      # CI gate = the overflow audit only; screenshot baselines re-land at P6 once
      # the remodel's pixels stabilise.
      - name: Run overflow audit
        run: npx playwright test tests/visual/overflow.spec.ts --grep "overflow audit" --reporter=list
      - name: Upload diff artefacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: visual-diffs
          path: test-results/
