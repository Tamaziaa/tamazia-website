name: CF old-account config dump (temporary)
on: workflow_dispatch
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Dump turnstile + KV from old account
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          mkdir -p out
          H="Authorization: Bearer $CF_API_TOKEN"
          B="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID"
          curl -s -H "$H" "$B/challenges/widgets" > out/turnstile.json
          NS=7c7537a8d5ad444491a92aa16c4abce0
          curl -s -H "$H" "$B/storage/kv/namespaces/$NS/keys?limit=1000" > out/kv_keys.json
          mkdir -p out/kv
          python3 - <<'PY'
          import json, subprocess, os, urllib.parse
          tok=os.environ['CF_API_TOKEN']; acct=os.environ['CF_ACCOUNT_ID']
          ns='7c7537a8d5ad444491a92aa16c4abce0'
          try: keys=[k['name'] for k in json.load(open('out/kv_keys.json'))['result']]
          except Exception as e: print('kv list failed', e); keys=[]
          print(len(keys),'keys')
          for i,k in enumerate(keys[:2000]):
              q=urllib.parse.quote(k,safe='')
              r=subprocess.run(['curl','-s','-H',f'Authorization: Bearer {tok}',f'https://api.cloudflare.com/client/v4/accounts/{acct}/storage/kv/namespaces/{ns}/values/{q}'],capture_output=True)
              open(f'out/kv/{i:05d}.dat','wb').write(r.stdout)
              open(f'out/kv/{i:05d}.key','w').write(k)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: cf-old-extra
          path: out/
          retention-days: 1
