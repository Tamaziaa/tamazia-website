# Method B · Lighthouse CI + axe + Pa11y combined gate
# Mobile + Desktop Lighthouse, axe-core a11y, Pa11y WCAG 2.2 AA
name: lighthouse-pa11y
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run build
      - name: Start preview
        run: npm run preview &
      - run: sleep 4
      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --collect.url=http://localhost:4321 \
            --collect.url=http://localhost:4321/pricing \
            --collect.url=http://localhost:4321/contact \
            --upload.target=temporary-public-storage \
            --assert.assertions.performance=warn \
            --assert.assertions.accessibility=error
      - name: Pa11y CI
        run: |
          npm install -g pa11y-ci
          pa11y-ci --config .pa11yci
