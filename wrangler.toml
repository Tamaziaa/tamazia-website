# Cloudflare Pages config
# Phase 3 perfection · KV-backed form submission pipeline
name = "tamazia-website"
compatibility_date = "2026-05-04"
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "FORM_SUBMISSIONS"
id = "PLACEHOLDER_REPLACE_AFTER_NAMESPACE_CREATE"

[vars]
RESEND_FROM_ALERT = "Tamazia Forms <forms@tamazia.in>"
RESEND_FROM_ACK = "Tamazia <founder@tamazia.in>"
RESEND_REPLY_TO = "founder@tamazia.co.uk"
ALERT_TO = "realfamemedia@gmail.com"
