name: Phase A polish · set NEON_URL + CAL_API_KEY + GH_TOKEN on CF Pages
on:
  workflow_dispatch:
    inputs:
      neon_url:
        description: 'NEON_URL connection string'
        required: true
        type: string
      cal_api_key:
        description: 'CAL_API_KEY (cal_live_...)'
        required: true
        type: string
      gh_token:
        description: 'GH_TOKEN (fine-grained PAT, reads workflow runs)'
        required: true
        type: string

jobs:
  set-extras:
    runs-on: ubuntu-latest
    steps:
      - name: PATCH CF Pages env vars
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NEON_URL: ${{ github.event.inputs.neon_url }}
          CAL_API_KEY: ${{ github.event.inputs.cal_api_key }}
          GH_TOKEN: ${{ github.event.inputs.gh_token }}
        run: |
          set -e
          PROJECT=tamazia-website
          URL="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}"
          BODY=$(python3 -c "
          import json, os
          body = {
            'deployment_configs': {
              'production': {
                'env_vars': {
                  'NEON_URL': { 'type': 'secret_text', 'value': os.environ['NEON_URL'] },
                  'CAL_API_KEY': { 'type': 'secret_text', 'value': os.environ['CAL_API_KEY'] },
                  'GH_TOKEN': { 'type': 'secret_text', 'value': os.environ['GH_TOKEN'] },
                }
              }
            }
          }
          print(json.dumps(body))
          ")
          RESP=$(curl -s -X PATCH "${URL}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${BODY}")
          SUCCESS=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('success'))")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::PATCH failed"
            echo "$RESP" | head -c 500
            exit 1
          fi
          echo "::notice::3 secrets added to CF Pages"

      - name: Trigger redeploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          PROJECT=tamazia-website
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" > /dev/null
          echo "::notice::Redeploy triggered"
