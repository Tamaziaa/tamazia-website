<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .eyebrow { font: 600 18px/1 'Inter', sans-serif; letter-spacing: 0.18em; fill: #5A1A2B; }
