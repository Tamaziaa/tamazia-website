name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # ---- DEPLOY-SAFETY GATES (fail the build before any deploy) ----------------
      # These run the vendored audit-render QA harnesses (_qa/*.mjs — repo-local copies
      # of the canonical _tools/ harnesses, which live OUTSIDE this repo at the rebuild
      # root and are not checked out in CI). They render the real audit-app.js +
      # audit-charts.js via jsdom (a devDependency) against the frozen fixture snapshot
      # under _qa/fixtures/. This is what guards the audit shell (incl. the self-hosted
      # font change in functions/audit/_shell.js) from regressions.

      - name: 'Gate · QA render (jsdom · 0 issues required)'
        run: node _qa/qa_render.mjs

      - name: 'Gate · comprehensive backtest (70 checks/audit · regression guard)'
        # Structure/render checks (the shell guard) plus the data-layer checks must all stay
        # green. The known data-layer baseline is now clear — the duplicate-fix-text bug was
        # fixed in _adapter.js (differentiateFixes), so the gate runs at zero tolerance:
        # ANY bug, old or new, fails the deploy.
        run: node _qa/backtest.mjs --max-bugs=0

      - name: 'Gate · Pages Functions build (catches relative-import breaks)'
        # A bad relative import inside functions/ (the class of bug that broke a past deploy)
        # only surfaces when wrangler bundles the functions. Build to a throwaway outdir so
        # this fails fast, before the real compile + deploy below.
        run: npx --yes wrangler@4.19.1 pages functions build functions/ --outdir=/tmp/fnbuild
      # ----------------------------------------------------------------------------

      - name: Build Astro site
        run: npm run build

      - name: Run patch-dist
        run: node patch-dist.js

      - name: Compile Cloudflare Functions
        run: |
          npx --yes wrangler@4.19.1 pages functions build functions/ \
            --outdir=dist/_worker_build \
            --project-directory=dist
          cp dist/_worker_build/index.js dist/_worker.js

      - name: Notify Slack + Telegram on deploy failure (self-verifying endpoint)
        if: failure()
        env:
          SHA: ${{ github.sha }}
          RUN: ${{ github.run_id }}
          TITLE: ${{ github.event.head_commit.message }}
        run: |
          set +e
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({
            'run_id': os.environ['RUN'],
            'sha': os.environ['SHA'],
            'title': (os.environ.get('TITLE') or 'deploy')[:200],
          }))
          ")
          curl -s -X POST "https://tamazia-website-3fy.pages.dev/api/admin/notify-deploy" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
          echo "notify-deploy fired"


      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4.19.1 pages deploy dist/ \
            --project-name=tamazia-website \
            --branch=main \
            --no-bundle \
            --commit-dirty=true

      - name: Post-deploy synthetic check
        run: |
          sleep 30
          fail=0
          for ep in /api/contact /api/audit /api/briefings; do
            CODE=$(curl -sX POST -o /dev/null -w "%{http_code}" --max-time 10 \
              -H 'Content-Type: application/json' -d '{}' \
              "https://tamazia-website-3fy.pages.dev${ep}")
            if [ "$CODE" = "404" ]; then
              echo "FAIL: ${ep} returns 404"
              fail=1
            else
              echo "OK ${ep} -> ${CODE}"
            fi
          done
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://tamazia-website-3fy.pages.dev/api/health")
          if [ "$CODE" != "200" ]; then
            echo "FAIL: /api/health -> ${CODE}"
            fail=1
          else
            echo "OK /api/health -> 200"
          fi
          exit $fail

      - name: 'Post-deploy · audit page probe (200 + window.D)'
        # End-to-end check that the contract-driven audit page actually renders live:
        # /audit/<slug>/<hash> must return 200 and contain the injected `window.D`.
        # The (slug, hash) come from repo secrets so ops can pin a known-good, non-expiring
        # audit row in Neon. The page-load path matches on slug+hash only — the HMAC sig is
        # OPTIONAL on load (see functions/audit/[[path]].js) — so no signing is needed here.
        # If the secrets are not configured, the probe is skipped (never blocks the deploy).
        env:
          SLUG: ${{ secrets.AUDIT_PROBE_SLUG }}
          HASH: ${{ secrets.AUDIT_PROBE_HASH }}
        run: |
          if [ -z "$SLUG" ] || [ -z "$HASH" ]; then
            echo "SKIP audit probe · set AUDIT_PROBE_SLUG + AUDIT_PROBE_HASH secrets to enable"
            exit 0
          fi
          URL="https://tamazia-website-3fy.pages.dev/audit/${SLUG}/${HASH}"
          BODY=$(curl -s --max-time 15 -w '\n%{http_code}' "$URL")
          CODE=$(printf '%s' "$BODY" | tail -n1)
          HTML=$(printf '%s' "$BODY" | sed '$d')
          if [ "$CODE" != "200" ]; then
            echo "FAIL: ${URL} -> ${CODE} (expected 200)"
            exit 1
          fi
          if ! printf '%s' "$HTML" | grep -q 'window.D'; then
            echo "FAIL: ${URL} returned 200 but no window.D in body"
            exit 1
          fi
          echo "OK audit probe -> 200 + window.D present"
