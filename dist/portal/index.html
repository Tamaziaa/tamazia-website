<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>Client Portal · Tamazia</title>
<style>:root{color-scheme:light}body{font:15px/1.55 -apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#faf9f5;color:#1a1a1a}.wrap{max-width:860px;margin:0 auto;padding:32px 20px}.brand{font-weight:700;letter-spacing:.18em;font-size:13px;color:#c96442}h1{font-family:Georgia,serif;font-weight:600;margin:6px 0 2px}.sub{color:#6b6b6b;font-size:13px}.card{background:#fff;border:1px solid #ece9e2;border-radius:12px;padding:18px;margin:16px 0}.kpis{display:flex;flex-wrap:wrap;gap:12px}.kpi{flex:1;min-width:140px;background:#fff;border:1px solid #ece9e2;border-radius:10px;padding:12px}.kpi .l{font-size:11px;color:#8a8a8a;text-transform:uppercase;letter-spacing:.08em}.kpi .v{font-size:20px;font-weight:600;margin-top:4px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:8px 6px;border-bottom:1px solid #f0ede6}.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:#eef}.g{background:#e7f5ec;color:#1c7a3e}.a{background:#fdf0e0;color:#a85b13}.btn{display:inline-block;background:#c96442;color:#fff;padding:9px 16px;border-radius:8px;text-decoration:none;font-size:13px}</style>
</head><body><div class="wrap" id="app"><p class="sub">Loading your portal…</p></div>
<script>
(function(){
  var p=new URLSearchParams(location.search), slug=p.get('c')||p.get('slug'), t=p.get('t');
  var app=document.getElementById('app');
  if(!slug||!t){ app.innerHTML='<p>Invalid portal link.</p>'; return; }
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  /* js/incomplete-html-attribute-sanitization (SEC-02): esc(d.audit_url) was dropped straight into href="...".
     HTML-escaping does not touch a scheme: `javascript:alert(1)` survives esc() intact and still executes on click.
     The only correct control is a scheme ALLOWLIST. Strip the control/zero-width chars browsers ignore, then demand
     an absolute http(s) URL or a site-relative path; anything else is not rendered as a link at all. */
  function safeUrl(u){var t=String(u==null?'':u).replace(/[\u0000-\u0020\u00a0\u200b\ufeff]/g,'');
    if(/^https?:\/\//i.test(t)) return t;
    if(/^\/[^\/\\]/.test(t)) return t;   /* site-relative, but never protocol-relative //evil.com */
    return '';}
  fetch('/api/portal?slug='+encodeURIComponent(slug)+'&t='+encodeURIComponent(t)).then(function(r){return r.json();}).then(function(d){
    if(!d.ok){ app.innerHTML='<p>'+esc(d.error||'Not available')+'</p>'; return; }
    var ob=(d.onboarding||[]).map(function(o){return '<tr><td>Day '+esc(o.day_offset)+'</td><td>'+esc(o.title)+'</td><td>'+esc((o.due_date||'').slice(0,10))+'</td><td><span class="tag '+(o.status==='done'?'g':'a')+'">'+esc(o.status)+'</span></td></tr>';}).join('');
    var inv=(d.invoices||[]).map(function(i){return '<tr><td>'+esc(i.invoice_number)+'</td><td>'+esc(i.invoice_kind)+'</td><td>'+esc(i.currency)+' '+esc(i.amount)+'</td><td><span class="tag '+(i.status==='paid'?'g':'a')+'">'+esc(i.status)+'</span></td></tr>';}).join('');
    var done=(d.onboarding||[]).filter(function(o){return o.status==='done';}).length, tot=(d.onboarding||[]).length;
    app.innerHTML='<div class="brand">TAMAZIA</div><h1>'+esc(d.company)+' · Client Portal</h1><p class="sub">Lawyer-led compliance + SEO · '+esc(d.sector)+'</p>'
      +'<div class="kpis" style="margin-top:16px"><div class="kpi"><div class="l">Plan</div><div class="v">'+esc(d.account.tier||'-')+'</div></div><div class="kpi"><div class="l">Status</div><div class="v">'+esc(d.account.status||'-')+'</div></div><div class="kpi"><div class="l">Health</div><div class="v">'+esc(d.account.health!=null?d.account.health:'-')+'</div></div><div class="kpi"><div class="l">Onboarding</div><div class="v">'+done+'/'+tot+'</div></div></div>'
      +(safeUrl(d.audit_url)?'<div class="card"><strong>Your compliance + SEO audit</strong><p class="sub">400+ frameworks reviewed.</p><a class="btn" href="'+esc(safeUrl(d.audit_url))+'" target="_blank" rel="noopener">View your audit</a></div>':'')
      +'<div class="card"><strong>Onboarding (30-day plan)</strong><table><thead><tr><th>When</th><th>Milestone</th><th>Due</th><th>Status</th></tr></thead><tbody>'+(ob||'<tr><td colspan="4">Starting soon.</td></tr>')+'</tbody></table></div>'
      +'<div class="card"><strong>Invoices</strong><table><thead><tr><th>Number</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead><tbody>'+(inv||'<tr><td colspan="4">None yet.</td></tr>')+'</tbody></table></div>'
      +'<p class="sub" style="margin-top:20px">Questions? Reply to your onboarding email or contact your account manager.</p>';
  }).catch(function(){ app.innerHTML='<p>Could not load portal.</p>'; });
})();
</script></body></html>
