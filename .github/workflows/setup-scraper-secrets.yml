name: Phase F2 polish · set SERPER + HUNTER + NEVERBOUNCE on CF Pages
on:
  workflow_dispatch:
    inputs:
      serper_api_key:
        description: 'SERPER_API_KEY'
        required: true
        type: string
      hunter_api_key:
        description: 'HUNTER_API_KEY'
        required: true
        type: string
      neverbounce_api_key:
        description: 'NEVERBOUNCE_API_KEY'
        required: false
        default: ''
        type: string

jobs:
  set-scrape-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: PATCH CF Pages env vars
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SERPER_API_KEY: ${{ github.event.inputs.serper_api_key }}
          HUNTER_API_KEY: ${{ github.event.inputs.hunter_api_key }}
          NEVERBOUNCE_API_KEY: ${{ github.event.inputs.neverbounce_api_key }}
        run: |
          set -e
          PROJECT=tamazia-website
          URL="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}"
          BODY=$(python3 -c "
          import json, os
          ev = {
            'SERPER_API_KEY': { 'type': 'secret_text', 'value': os.environ['SERPER_API_KEY'] },
            'HUNTER_API_KEY': { 'type': 'secret_text', 'value': os.environ['HUNTER_API_KEY'] },
          }
          if os.environ.get('NEVERBOUNCE_API_KEY'):
            ev['NEVERBOUNCE_API_KEY'] = { 'type': 'secret_text', 'value': os.environ['NEVERBOUNCE_API_KEY'] }
          print(json.dumps({ 'deployment_configs': { 'production': { 'env_vars': ev } } }))
          ")
          RESP=$(curl -s -X PATCH "${URL}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${BODY}")
          SUCCESS=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('success'))")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::PATCH failed"; echo "$RESP" | head -c 400; exit 1
          fi
          echo "::notice::scraper secrets added to CF Pages"

      - name: Trigger redeploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          PROJECT=tamazia-website
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" > /dev/null
          echo "::notice::Redeploy triggered"
