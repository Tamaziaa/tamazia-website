name: One-shot · set Slack + Telegram secrets on Cloudflare Pages
on:
  workflow_dispatch:
    inputs:
      slack_bot_token:
        description: 'SLACK_BOT_TOKEN (xoxb-...)'
        required: true
        type: string
      slack_channel:
        description: 'SLACK_CHANNEL (e.g. #all-tamazia)'
        required: false
        default: '#all-tamazia'
        type: string
      telegram_bot_token:
        description: 'TELEGRAM_BOT_TOKEN (e.g. 8864...:AAFm...)'
        required: true
        type: string
      telegram_chat_id:
        description: 'TELEGRAM_CHAT_ID (numeric)'
        required: true
        type: string

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: PATCH Cloudflare Pages project env vars (secret_text)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SLACK_BOT_TOKEN: ${{ github.event.inputs.slack_bot_token }}
          SLACK_CHANNEL: ${{ github.event.inputs.slack_channel }}
          TELEGRAM_BOT_TOKEN: ${{ github.event.inputs.telegram_bot_token }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
        run: |
          set -e
          PROJECT=tamazia-website
          URL="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}"

          # Build the PATCH body. secret_text type encrypts at rest.
          BODY=$(cat <<JSON
          {
            "deployment_configs": {
              "production": {
                "env_vars": {
                  "SLACK_BOT_TOKEN":    { "type": "secret_text", "value": "${SLACK_BOT_TOKEN}" },
                  "SLACK_CHANNEL":      { "type": "plain_text",  "value": "${SLACK_CHANNEL}" },
                  "TELEGRAM_BOT_TOKEN": { "type": "secret_text", "value": "${TELEGRAM_BOT_TOKEN}" },
                  "TELEGRAM_CHAT_ID":   { "type": "plain_text",  "value": "${TELEGRAM_CHAT_ID}" }
                }
              }
            }
          }
          JSON
          )

          RESP=$(curl -s -X PATCH "${URL}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${BODY}")

          echo "Response:"
          echo "${RESP}" | python3 -c "import json,sys;d=json.load(sys.stdin);print('success:', d.get('success'));print('errors:', d.get('errors'));"

          SUCCESS=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('success'))")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::CF Pages env var PATCH failed"
            exit 1
          fi
          echo "::notice::CF Pages env vars updated successfully"


      - name: Trigger redeploy so new vars are picked up
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          PROJECT=tamazia-website
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json"
          echo "Redeploy triggered."
