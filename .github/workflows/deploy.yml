name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Run patch-dist
        run: node patch-dist.js

      - name: Compile Cloudflare Functions
        run: |
          npx wrangler pages functions build functions/ \
            --outdir=dist/_worker_build \
            --project-directory=dist
          cp dist/_worker_build/index.js dist/_worker.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist/ \
            --project-name=tamazia-website \
            --branch=main \
            --no-bundle \
            --commit-dirty=true

      - name: Post-deploy synthetic check
        run: |
          sleep 30
          fail=0
          for ep in /api/contact /api/audit /api/briefings; do
            CODE=$(curl -sX POST -o /dev/null -w "%{http_code}" --max-time 10 \
              -H 'Content-Type: application/json' -d '{}' \
              "https://tamazia-website.pages.dev${ep}")
            if [ "$CODE" = "404" ]; then
              echo "FAIL: ${ep} returns 404"
              fail=1
            else
              echo "OK ${ep} -> ${CODE}"
            fi
          done
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://tamazia-website.pages.dev/api/health")
          if [ "$CODE" != "200" ]; then
            echo "FAIL: /api/health -> ${CODE}"
            fail=1
          else
            echo "OK /api/health -> 200"
          fi
          exit $fail
