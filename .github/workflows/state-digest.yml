# STATE digest
# Regenerates docs/STATE.md (< 8 KB: live Neon counts, last runs, open flags) and
# docs/CONTEXT-PACK.md from the NEON_URL secret, then opens/updates a PR with any change.
# Runs post-merge (push to main), daily, and on demand. Read-only against Neon.
#
# S4[D51] · main is ruleset-protected, so a direct `git push` from the workflow is
# rejected and silently swallowed — which is why docs/STATE.md never persisted (0 bytes).
# This now raises a PR via peter-evans/create-pull-request instead, which is allowed
# under branch protection and lands the digest once merged (auto-merge can be enabled
# on the PR if desired).

name: STATE digest

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/STATE.md'
      - 'docs/CONTEXT-PACK.md'
  schedule:
    - cron: '17 6 * * *' # daily 06:17 UTC (alongside the other morning jobs)
  workflow_dispatch:

# Avoid two runs racing to open the docs PR.
concurrency:
  group: state-digest
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - name: Generate STATE.md + CONTEXT-PACK.md from Neon
        env:
          NEON_URL: ${{ secrets.NEON_URL }}
        run: node scripts/gen-state-digest.mjs

      - name: Enforce STATE.md size budget (< 8 KB)
        run: |
          bytes=$(wc -c < docs/STATE.md)
          echo "docs/STATE.md = ${bytes} bytes"
          if [ "$bytes" -ge 8192 ]; then
            echo "::error::docs/STATE.md is ${bytes} bytes (>= 8192). Budget exceeded."
            exit 1
          fi

      # NOTE: This step requires "Allow GitHub Actions to create and approve pull
      # requests" to be enabled in Settings → Actions → General → Workflow permissions.
      # Without it, create-pull-request returns 403 and this step is skipped (not
      # a workflow failure). Enable the repo setting to make PRs auto-open.
      - name: Open/update digest PR (if changed)
        id: cpr
        continue-on-error: true
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          commit-message: "chore(state): regenerate STATE digest [skip ci]"
          branch: bot/state-digest
          delete-branch: true
          title: "chore(state): regenerate STATE digest"
          body: |
            Automated STATE/CONTEXT-PACK regeneration from live Neon (read-only).
            Source of truth = GitHub main; this PR lands the latest live counts.
            Safe to merge. Regenerated by `.github/workflows/state-digest.yml`.
          add-paths: |
            docs/STATE.md
            docs/CONTEXT-PACK.md

      - name: Warn if PR creation was skipped
        if: steps.cpr.outcome == 'failure'
        run: |
          echo "::warning::STATE digest generated but PR creation failed (403 — GitHub Actions cannot create PRs on this repo). Enable 'Allow GitHub Actions to create and approve pull requests' in Settings → Actions → General to auto-open the PR. The digest was still generated successfully."
